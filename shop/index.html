<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STARTUS Sports Academy ショップ</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://js.stripe.com/v3/" async></script>
</head>
<body>
  <!-- Preview banner -->
  <div class="preview-banner" id="preview-banner" style="display:none">
    <span class="material-icons">visibility</span>
    管理者プレビュー
    <div class="preview-device-toggle">
      <button class="preview-device-btn active" data-device="desktop" onclick="window.shopPreview.setDevice('desktop')">
        <span class="material-icons">desktop_windows</span>Desktop
      </button>
      <button class="preview-device-btn" data-device="tablet" onclick="window.shopPreview.setDevice('tablet')">
        <span class="material-icons">tablet_mac</span>Tablet
      </button>
      <button class="preview-device-btn" data-device="mobile" onclick="window.shopPreview.setDevice('mobile')">
        <span class="material-icons">phone_iphone</span>Mobile
      </button>
    </div>
    <a href="/">プレビューを終了</a>
  </div>

  <!-- Device preview frame (iframe container for tablet/mobile) -->
  <div class="preview-device-frame" id="preview-device-frame" style="display:none">
    <div class="preview-device-shell" id="preview-device-shell">
      <iframe id="preview-iframe" src="" frameborder="0"></iframe>
    </div>
  </div>

  <!-- Header -->
  <header class="shop-header">
    <div class="shop-header-inner">
      <a href="/" class="shop-logo">
        <span class="shop-logo-icon">&#9917;</span>
        STARTUS Shop
      </a>
      <button class="shop-cart-btn" id="cart-btn" onclick="window.shopApp.toggleCart()">
        <span class="material-icons">shopping_cart</span>
        <span class="shop-cart-badge" id="cart-badge" style="display:none">0</span>
      </button>
    </div>
  </header>

  <!-- Main content -->
  <main class="shop-main" id="shop-main"></main>

  <!-- Cart drawer -->
  <div class="cart-overlay" id="cart-overlay" onclick="window.shopApp.toggleCart()"></div>
  <aside class="cart-drawer" id="cart-drawer">
    <div class="cart-drawer-header">
      <h3>カート</h3>
      <button class="cart-drawer-close" onclick="window.shopApp.toggleCart()">
        <span class="material-icons">close</span>
      </button>
    </div>
    <div class="cart-drawer-body" id="cart-drawer-body"></div>
    <div class="cart-drawer-footer" id="cart-drawer-footer"></div>
  </aside>

  <!-- Toast -->
  <div class="shop-toast-container" id="shop-toast-container"></div>

  <!-- Footer -->
  <footer class="shop-footer">
    <p>&copy; 2025 STARTUS Sports Academy かなざわ</p>
  </footer>

  <script type="module" src="js/shop-app.js"></script>
</body>
</html>
